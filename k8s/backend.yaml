apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: llm-lab
type: Opaque
stringData:
  SECRET_KEY: change-this-to-a-random-secret-key
  DEEPSEEK_API_KEY: ""
  GROQ_API_KEY: ""
  OPENAI_API_KEY: ""
  GEMINI_API_KEY: ""

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: llm-lab
data:
  DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/llm_lab"
  HF_MODEL_NAME: "google/flan-t5-small"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: llm-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: llm-lab-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: llm-lab
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
