# Local development only. Never commit .env or real credentials.
# On Render: use the root Dockerfile, add a Postgres instance, and set all
# env vars (DATABASE_URL, SECRET_KEY, etc.) in Dashboard → Environment.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-llm_lab}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      args:
        TORCH_GPU: ${TORCH_GPU:-0}
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Use DATABASE_URL from env when set (e.g. Render); else build for local postgres
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-llm_lab}}
    volumes:
      - hf_cache:/root/.cache/huggingface

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  postgres_data:
  hf_cache:
